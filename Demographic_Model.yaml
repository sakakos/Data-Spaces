HouseholdContext:
  description: 'Static sociodemographic metadata and appliance specifications for House 1.'
  properties:
    id:
      anyOf:
        - description: Identifier format of any NGSI entity
          maxLength: 256
          minLength: 1
          pattern: ^[\w\-\.\{\}\$\+\*\[\]`|~^@!,:\\]+$
          type: string
          x-ngsi:
            type: Property
        - description: Identifier format of any NGSI entity
          format: uri
          type: string
          x-ngsi:
            type: Property
      description: Unique identifier of the entity
      x-ngsi:
        type: Property
    type:
      description: NGSI Entity type
      enum:
        - HouseholdContext
      type: string
      x-ngsi:
        type: Property
    occupancy:
      description: 'Number of adult occupants (from sociodemographic data).'
      minimum: 0
      type: integer
      x-ngsi:
        model: https://schema.org/Number
        type: Property
    respondentAge:
      description: 'Age of the respondent (e.g., 27).'
      type: integer
      x-ngsi:
        model: https://schema.org/Number
        type: Property
    respondentOccupation:
      description: 'Occupation of the respondent (e.g., Data Scientist).'
      type: string
      x-ngsi:
        model: https://schema.org/Text
        type: Property
    monthlyIncomeRange:
      description: 'Family monthly income bracket.'
      type: string
      x-ngsi:
        model: https://schema.org/Text
        type: Property
    applianceMetadata:
      description: 'Technical specs from appliances_metadata.csv.'
      type: array
      items:
        type: object
        properties:
          name:
            description: 'Appliance identifier (e.g., ac_1)'
            type: string
          wattage:
            description: 'Max wattage [W]'
            type: number
          threshold:
            description: 'Power threshold [W]'
            type: number
          minOnDuration:
            description: 'Minimum ON duration (sec)'
            type: number
          minOffDuration:
            description: 'Minimum OFF duration (sec)'
            type: number
      x-ngsi:
        model: https://schema.org/StructuredValue
        type: Property
  required:
    - id
    - type
  type: object
  x-derived-from: "Plegma/GECKO Dataset House 1"
  x-version: 0.0.1