services:
  kong:
    image: quay.io/fiware/kong:0.5.4
    volumes:
      - ./kong.yml:/usr/local/kong/declarative/kong.yml
      - ./iShare/cert.pem:/iShare/certificate.pem
    container_name: kong-standalone
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
      KONG_PLUGINS: bundled,ngsi-ishare-policies
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8443:8443"
    networks:
      - keyrock_net
      - orion_net
  dsba-pdp:
    image: quay.io/fiware/dsba-pdp:latest
    container_name: dsba-pdp
    environment:
      - SERVER_PORT=8080
      - ISHARE_ENABLED=true
      - ISHARE_CLIENT_ID=EU.EORI.NLPLEGMA
      - ISHARE_CERTIFICATE_PATH=/iShare/certificate.pem
      - ISHARE_KEY_PATH=/iShare/key.pem
      - ISHARE_AR_ID=EU.EORI.NLPLEGMA
      - ISHARE_AUTHORIZATION_REGISTRY_URL=http://fiware-keyrock:3007
      - ISHARE_SATELLITE_ID=EU.EORI.NLPLEGMA
      - ISHARE_SATELLITE_URL=http://ishare-satellite:8080
      - ISHARE_SATELLITE_TOKEN_PATH=/token
      - ISHARE_SATELLITE_TRUSTED_LIST_PATH=/trusted_list
      - ISHARE_TRUSTED_FINGERPRINTS_LIST=99F26A25D2C72E15B3A3F39555CA738747C393746A85571005A4336AB5A2506A
    volumes:
      - ./iShare/key.pem:/iShare/key.pem
      - ./iShare/cert.pem:/iShare/certificate.pem
    ports:
      - "8080:8080"
    networks:
      - orion_net
      - keyrock_net
  ishare-satellite:
    image: fiware/ishare-satellite:2.0.2
    container_name: ishare-satellite
    volumes:
      - ./satellite.yml:/var/satellite/config/satellite.yml
    ports:
      - "8085:8080"
    networks:
      - orion_net
      - keyrock_net

networks:
  keyrock_net:
    external: true
    name: fiware-keyrock_default
  orion_net:
    external: true
    name: fiware_default