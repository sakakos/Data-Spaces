openapi: 3.0.0
info:
  title: Plegma/GECKO Smart Home Data Model
  version: 1.0.0
  description: NGSI-LD Data Models for the Greek Household dataset.
  contact:
    name: Smart Data Models
    url: https://smartdatamodels.org/
paths: {}
components:
  schemas:
    # --- Model 1
    ResidentialElectricityMeasurement:
      description: 'Electricity consumption data (10s granularity) for House 1.'
      properties:
        id:
          description: Unique identifier of the entity
          type: string
          format: uri
          x-ngsi:
            type: Property
        type:
          description: NGSI Entity type
          type: string
          enum:
            - ResidentialElectricityMeasurement
          x-ngsi:
            type: Property
        dateObserved:
          description: 'Timestamp (from column: timestamp).'
          type: string
          format: date-time
          x-ngsi:
            model: https://schema.org/DateTime
            type: Property
        refHousehold:
          description: Reference to the HouseholdContext entity.
          type: string
          format: uri
          x-ngsi:
            type: Relationship
        aggregateActivePower:
          description: 'Active Power (Watt) - P_agg.'
          type: number
          minimum: 0
          x-ngsi:
            model: https://schema.org/Number
            type: Property
            unitCode: WDT
        aggregateVoltage:
          description: 'Voltage (Volt) - V.'
          type: number
          minimum: 0
          x-ngsi:
            model: https://schema.org/Number
            type: Property
            unitCode: VLT
        aggregateCurrent:
          description: 'Current (Ampere) - A.'
          type: number
          minimum: 0
          x-ngsi:
            model: https://schema.org/Number
            type: Property
            unitCode: AMP
        appliancePower:
          description: 'Map of appliance power (ac_1, fridge, etc.).'
          type: object
          additionalProperties:
            type: number
          x-ngsi:
            model: https://schema.org/StructuredValue
            type: Property
            unitCode: WDT
        measurementQualityIssue:
          description: 'Issue flag (0 or 1).'
          type: boolean
          x-ngsi:
            model: https://schema.org/Boolean
            type: Property
      required:
        - id
        - type
        - dateObserved
      type: object

    # --- Model 2
    ResidentialEnvironmentMeasurement:
      description: 'Environmental data (15min granularity) for House 1.'
      properties:
        id:
          description: Unique identifier of the entity
          type: string
          format: uri
          x-ngsi:
            type: Property
        type:
          description: NGSI Entity type
          type: string
          enum:
            - ResidentialEnvironmentMeasurement
          x-ngsi:
            type: Property
        dateObserved:
          description: 'Timestamp (from column: timestamp).'
          type: string
          format: date-time
          x-ngsi:
            model: https://schema.org/DateTime
            type: Property
        refHousehold:
          description: Reference to the HouseholdContext entity.
          type: string
          format: uri
          x-ngsi:
            type: Relationship
        indoorTemperature:
          description: 'Internal temperature (°C).'
          type: number
          x-ngsi:
            model: https://schema.org/Number
            type: Property
            unitCode: CEL
        indoorRelativeHumidity:
          description: 'Internal humidity (%).'
          type: number
          minimum: 0
          maximum: 100
          x-ngsi:
            model: https://schema.org/Number
            type: Property
            unitCode: P1
        outdoorTemperature:
          description: 'External temperature (°C).'
          type: number
          x-ngsi:
            model: https://schema.org/Number
            type: Property
            unitCode: CEL
        outdoorRelativeHumidity:
          description: 'External humidity (%).'
          type: number
          minimum: 0
          maximum: 100
          x-ngsi:
            model: https://schema.org/Number
            type: Property
            unitCode: P1
      required:
        - id
        - type
        - dateObserved
      type: object

    # --- Model 3
    HouseholdContext:
      description: 'Static sociodemographic metadata.'
      properties:
        id:
          description: Unique identifier of the entity
          type: string
          format: uri
          x-ngsi:
            type: Property
        type:
          description: NGSI Entity type
          type: string
          enum:
            - HouseholdContext
          x-ngsi:
            type: Property
        occupancy:
          description: 'Number of adult occupants.'
          type: integer
          minimum: 0
          x-ngsi:
            model: https://schema.org/Number
            type: Property
        respondentAge:
          description: 'Age of the respondent.'
          type: integer
          x-ngsi:
            model: https://schema.org/Number
            type: Property
        respondentOccupation:
          description: 'Occupation of the respondent.'
          type: string
          x-ngsi:
            model: https://schema.org/Text
            type: Property
        monthlyIncomeRange:
          description: 'Family monthly income bracket.'
          type: string
          x-ngsi:
            model: https://schema.org/Text
            type: Property
        applianceMetadata:
          description: 'Technical specs from appliances_metadata.csv.'
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              wattage:
                type: number
              threshold:
                type: number
              minOnDuration:
                type: number
              minOffDuration:
                type: number
          x-ngsi:
            model: https://schema.org/StructuredValue
            type: Property
      required:
        - id
        - type
      type: object